name: Quality gate

# Runs the project's single source of truth (scripts/quality_gate.py) on a clean
# runner — the same gate the local Stop hook enforces. CI closes the gap that the
# hook only fires inside Claude Code sessions: raw git / other agents / UI merges
# would otherwise bypass it. Re-implementing the checks here would drift from the
# gate, so this workflow only sets up the env and invokes the gate as-is.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: quality-gate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - name: Install dependencies (locked, all extras)
        # --locked: fail if uv.lock is out of sync with pyproject (catches
        # "changed a dep, forgot uv lock"). --all-extras: the gate runs
        # `mypy src`, which type-checks web/ and so needs the web extra too.
        run: uv sync --all-extras --locked
      - name: Quality gate
        run: uv run python scripts/quality_gate.py
